name: Generate OpenStreetMap Garmin maps
on:
  push:
    branches:
      - cga
jobs:
  mkgmap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
      - run: mkdir -p .github/generated/
      - run: python scripts/create-github-action.py > .github/generated/action.yml
      - uses: ./.github/generated/
